<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Makeup</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
function g(id){return document.getElementById(id);}

const firebaseConfig={
  apiKey:"AIzaSyBHpwQJUxvwMTwXvrwAFyuGydOM7EqCBhw",
  authDomain:"wardrobe-sjw.firebaseapp.com",
  projectId:"wardrobe-sjw",
  storageBucket:"wardrobe-sjw.firebasestorage.app",
  messagingSenderId:"2487840884",
  appId:"1:2487840884:web:29f2bf8177a558736de121"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let _uid=null,_unsubs=[];

window._fbSignOut=()=>auth.signOut();
window.handleLogin=async()=>{
  const e=g('auth-email').value.trim(),p=g('auth-pass').value,err=g('auth-err');
  err.textContent='';
  try{await auth.signInWithEmailAndPassword(e,p);}
  catch(ex){err.textContent=fe(ex.code);}
};
window.handleSignup=async()=>{
  const e=g('auth-email').value.trim(),p=g('auth-pass').value,err=g('auth-err');
  err.textContent='';
  if(p.length<6){err.textContent='Password must be 6+ characters.';return;}
  try{await auth.createUserWithEmailAndPassword(e,p);}
  catch(ex){err.textContent=fe(ex.code);}
};
function fe(c){return({'auth/invalid-email':'Invalid email.','auth/user-not-found':'No account found.','auth/wrong-password':'Wrong password.','auth/email-already-in-use':'Email already in use — try logging in.','auth/invalid-credential':'Email or password incorrect.'})[c]||'Something went wrong.';}

document.addEventListener('DOMContentLoaded',()=>{
  auth.onAuthStateChanged(user=>{
    if(user){
      _uid=user.uid;
      g('auth-screen').style.display='none';
      g('app-root').style.display='flex';
      g('user-email-display').textContent=user.email;
      startListeners();
    }else{
      _uid=null;_unsubs.forEach(u=>u());_unsubs=[];
      g('auth-screen').style.display='flex';
      g('app-root').style.display='none';
    }
  });
});

function startListeners(){
  _unsubs.forEach(u=>u());_unsubs=[];
  let loaded={items:false,looks:false,wishlist:false,cats:false};
  function checkLoad(){
    if(Object.values(loaded).every(Boolean)){
      [50,200,500].forEach(ms=>setTimeout(()=>{
        if(typeof updateBadges==='function'&&typeof renderCurrent==='function'){
          updateBadges();renderCurrent();
        }
      },ms));
    }
  }
  const sub=(col,setter,key)=>db.collection('users').doc(_uid).collection('makeup_'+col).onSnapshot(snap=>{
    setter(snap.docs.map(d=>d.data()));
    if(!loaded[key]){loaded[key]=true;checkLoad();}
    else if(typeof updateBadges==='function')updateBadges();
  });
  _unsubs.push(sub('items',d=>{items=d;},'items'));
  _unsubs.push(sub('looks',d=>{looks=d;},'looks'));
  _unsubs.push(sub('wishlist',d=>{wishlist=d;},'wishlist'));
  _unsubs.push(sub('cats',d=>{cats=d;if(!cats.length)seedCats();},'cats'));
}

async function seedCats(){
  const b=db.batch();
  DEFAULT_CATS.forEach(c=>b.set(db.collection('users').doc(_uid).collection('makeup_cats').doc(c.id),c));
  await b.commit();
}

window.fbSave=async(col,item)=>{
  if(!_uid)return;setSyncDot('syncing');
  try{
    const cleaned={};
    for(const[k,v]of Object.entries(item)){
      if(v===undefined||v===null)continue;
      cleaned[k]=Array.isArray(v)?v.filter(x=>x!=null):v;
    }
    await db.collection('users').doc(_uid).collection('makeup_'+col).doc(item.id).set(cleaned);
    setSyncDot('ok');
  }catch(e){setSyncDot('error');console.error(e);}
};
window.fbDel=async(col,id)=>{
  if(!_uid)return;
  try{await db.collection('users').doc(_uid).collection('makeup_'+col).doc(id).delete();}
  catch(e){console.error(e);}
};
</script>

}

async function uploadToCloudinary(dataUrl){
  const blob=await(await fetch(dataUrl)).blob();
  const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',CLOUDINARY_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:'POST',body:fd});
  const data=await res.json();
  return data.secure_url;
}

}

function expiryStatus(dateStr){
  if(!dateStr)return null;
  const diff=Math.ceil((new Date(dateStr)-new Date())/(1000*60*60*24));
  if(diff<0)return{cls:'exp-expired',label:'Expired'};
  if(diff<=30)return{cls:'exp-soon',label:`${diff}d left`};
  if(diff<=90)return{cls:'exp-soon',label:`${Math.ceil(diff/30)}mo left`};
  return{cls:'exp-ok',label:'Good'};
}

function iCard(item){
  const h=hx(item.color);const fg=isLight(h)?'#1a1705':'#faf9f6';
  const cat=cats.find(c=>c.id===item.category)||{};
  const photos=item.photoUrls||[];const fp=photos[0]||null;
  const exp=expiryStatus(item.expiry);
  const swHtml=fp?`<div class="sw" style="padding:0"><img src="${fp}" alt=""><${photos.length>1?`span style="position:absolute;bottom:3px;right:4px;background:rgba(0,0,0,.45);color:#fff;font-size:9px;padding:1px 5px;border-radius:99px">${photos.length}</span`:'span style="display:none">'}</span></div>`:`<div class="sw" style="background:${h};color:${fg}">${cat.icon||'💄'}</div>`;
  const tags=[];
  if(item.favourite)tags.push(`<span class="tg tg-fav">⭐ Fav</span>`);
  if(item.stock==='Low'||item.stock==='Empty')tags.push(`<span class="tg tg-low">🪫 ${item.stock}</span>`);

  (item.tags||[]).slice(0,1).forEach(t=>tags.push(`<span class="tg">${t}</span>`));
  return`<div class="card cp" onclick="openDetail('${item.id}')">${swHtml}<div class="cn">${item.name}</div><div class="cs">${[item.brand,item.shade||item.type].filter(Boolean).join(' · ')||cat.name||'—'}</div><div class="tgs">${tags.join('')}</div></div>`;
}

async function prevIP(inp){

function saveItem(){
  const name=gv('f-name').trim();if(!name){showToast('Please enter a name.');return;}
  const orig=eItemId?items.find(i=>i.id===eItemId):null;
  const orderedPhotos=[...piPhotos];

  const item={id:eItemId||mid(),name,type:gv('f-type'),category:gv('f-cat'),brand:gv('f-brand').trim(),shade:gv('f-shade').trim(),finish:gv('f-finish'),formula:gv('f-formula').trim(),price:gv('f-price').trim(),purchaseDate:gv('f-pdate'),expiry:gv('f-expiry'),stock:gv('f-stock'),rating:gv('f-rating'),skin:gv('f-skin').trim(),store:gv('f-store').trim(),color:gC()||'Clear/nude',favourite:g('f-fav').checked,tags:gv('f-tags').split(',').map(t=>t.trim()).filter(Boolean),notes:gv('f-notes').trim(),photoUrls:[...orderedPhotos],addedAt:orig?.addedAt||Date.now(),updatedAt:Date.now()};
  if(eItemId)items=items.map(i=>i.id===eItemId?item:i);else items.push(item);

  const wasEditing=eItemId;cm('item-modal');updateBadges();renderCurrent();
  showToast(wasEditing?'Product updated ✓':'Product added ✓');
  persist('items',item);
}

function delItem(){
  const id=vItemId||eItemId;if(!id||!confirm('Delete this product?'))return;
  items=items.filter(i=>i.id!==id);
  cm('detail-modal');cm('item-modal');vItemId=null;eItemId=null;

function buildLookPicker(){
  const el=g('lpick');
  if(!items.length){el.innerHTML='<span style="font-size:12px;color:var(--text3)">Add products first.</span>';return;}
  const sorted=[...items].sort((a,b)=>{
    const ca=cats.find(c=>c.id===a.category)?.name||'';
    const cb=cats.find(c=>c.id===b.category)?.name||'';
    return ca.localeCompare(cb)||a.name.localeCompare(b.name);
  });
  const grouped={};
  sorted.forEach(item=>{
    const cat=cats.find(c=>c.id===item.category)||{name:'Other',icon:'✨'};
    if(!grouped[cat.name])grouped[cat.name]={icon:cat.icon||'✨',items:[]};
    grouped[cat.name].items.push(item);
  });
  el.innerHTML=Object.entries(grouped).map(([name,{icon,items:its}])=>
    `<div style="width:100%;margin:4px 0 2px"><span style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em">${icon} ${name}</span></div>`+
    its.map(item=>`<span class="chip ${selLookItems.has(item.id)?'on':''}" onclick="togLI('${item.id}',this)">${item.name}</span>`).join('')
  ).join('');
}
function togLI(id,el){if(selLookItems.has(id)){selLookItems.delete(id);el.classList.remove('on');}else{selLookItems.add(id);el.classList.add('on');}}

function rExpiry(){

  sFB('');
  const withExpiry=items.filter(i=>i.expiry).sort((a,b)=>a.expiry.localeCompare(b.expiry));

  if(!items.length){sCt(`<div class="empty"><div class="ei">📅</div><p>Add products with expiry dates to track them here.</p></div>`);return;}
  const groups={expired:[],soon:[],ok:[]};
  withExpiry.forEach(item=>{const exp=expiryStatus(item.expiry);if(exp.cls==='exp-expired')groups.expired.push(item);else if(exp.cls==='exp-soon')groups.soon.push(item);else groups.ok.push(item);});
  function exGroup(title,list,emoji){
    if(!list.length)return'';
    return`<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">${emoji} ${title} (${list.length})</div>

  }
  sCt(exGroup('Expired',groups.expired,'⚠️')+exGroup('Expiring soon',groups.soon,'🟡')+exGroup('Good',groups.ok,'✅')+(noExpiry.length?`<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">⬜ No expiry date (${noExpiry.length})</div><div style="font-size:12px;color:var(--text3)">Add expiry dates to these products in Edit.</div></div>`:''));

function rStats(){

  if(!items.length){sCt('<div class="empty"><div class="ei">📊</div><p>Add products to see insights.</p></div>');return;}
  const agg=key=>items.reduce((acc,i)=>{const k=i[key]||'Unknown';acc[k]=(acc[k]||0)+1;return acc;},{});
  const catAgg=items.reduce((acc,i)=>{const c=cats.find(x=>x.id===i.category);const k=c?`${c.icon} ${c.name}`:'Unknown';acc[k]=(acc[k]||0)+1;return acc;},{});
  const expired=items.filter(i=>i.expiry&&expiryStatus(i.expiry)?.cls==='exp-expired').length;
  const expSoon=items.filter(i=>i.expiry&&expiryStatus(i.expiry)?.cls==='exp-soon').length;
  const favs=items.filter(i=>i.favourite).length;
  const low=items.filter(i=>i.stock==='Low'||i.stock==='Empty').length;
  const prices=items.map(i=>parseFloat((i.price||'').replace(/[^0-9.]/g,'')||0)).filter(p=>p>0);
  const total=prices.reduce((a,b)=>a+b,0);
  const sym=items.find(i=>i.price)?.price?.replace(/[\d.,\s]/g,'')||'£';
  function chart(ti,obj,col){const s=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,7);const mx=Math.max(...s.map(x=>x[1]),1);return`<div class="cb"><div class="ct">${ti}</div>${s.map(([k,v])=>`<div class="br"><div class="bl">${k}</div><div class="bt"><div class="bf" style="width:${Math.round(v/mx*100)}%;background:${col}"></div></div><div class="bc">${v}</div></div>`).join('')}</div>`;}
  sCt(`<div class="sw2">${[['Products',items.length],['Looks',looks.length],['Favourites',favs],['Wishlist',wishlist.length],['Low/empty',low],expired||expSoon?['Expiring',expired+expSoon]:null,prices.length?['Total spent',`${sym}${Math.round(total)}`]:null].filter(Boolean).map(([l,v])=>`<div class="stb"><div class="stl">${l}</div><div class="stv">${v}</div></div>`).join('')}</div>
  <div class="charts">${chart('By category',catAgg,'#1a1705')}${chart('By type',agg('type'),'#E91E63')}${chart('By brand',agg('brand'),'#7B1FA2')}${chart('By finish',agg('finish'),'#F57C00')}${chart('By stock',agg('stock'),'#D32F2F')}${chart('By shade',agg('color'),'#C9A72A')}</div>`);
}

function openEditCat(id){eCatId=id;const c=cats.find(x=>x.id===id);if(!c)return;g('cmt').textContent='Edit category';g('cat-name').value=c.name;g('cat-icon').value=c.icon||'';g('cdel').style.display='';om('cat-modal');}
function saveCat(){const name=gv('cat-name').trim();if(!name){showToast('Enter a name.');return;}const cat={id:eCatId||'cat-'+mid(),name,icon:gv('cat-icon').trim()||'✨'};if(eCatId)cats=cats.map(c=>c.id===eCatId?cat:c);else cats.push(cat);cm('cat-modal');rSettings();showToast('Saved ✓');persist('cats',cat);}
function delCat(){if(!eCatId||!confirm('Delete this category?'))return;const id=eCatId;cats=cats.filter(c=>c.id!==id);items=items.map(i=>i.category===id?{...i,category:''}:i);cm('cat-modal');rSettings();showToast('Deleted');persistDel('cats',id);}

function rRoutines(){
  sCH(`<div class="ch"><div class="cht">Routines</div><div class="chs">Your step-by-step routines</div></div>`);
  sFB(`<div class="fb"><button class="btn sm pr" onclick="openAddRoutine()" style="margin-left:auto">+ New routine</button></div>`);
  if(!routines.length){sCt(`<div class="empty"><div class="ei">🗓️</div><p>Build a routine to organise your steps — morning skincare, evening glam, and more.</p></div>`);return;}
  sCt(`<div style="display:flex;flex-direction:column;gap:10px">${routines.map(r=>{
    const prods=(r.items||[]).map(id=>items.find(i=>i.id===id)).filter(Boolean);
    const timeEmoji={Morning:'🌅',Evening:'🌆',Night:'🌙',Weekend:'🎉','Any time':'⏰'}[r.time]||'🗓️';
    return`<div class="rcard" onclick="openRoutineDetail('${r.id}')">

function openAddRoutine(){
  eRoutineId=null;selRoutineItems=[];
  g('rmt').textContent='New routine';g('rdel').style.display='none';
  g('rf-name').value='';g('rf-time').value='';g('rf-dur').value='';g('rf-notes').value='';
  buildRoutinePicker();om('routine-modal');
}
function editRoutine(id){
  const r=routines.find(x=>x.id===id);if(!r)return;
  eRoutineId=id;selRoutineItems=[...(r.items||[])];
  g('rmt').textContent='Edit routine';g('rdel').style.display='';
  g('rf-name').value=r.name;g('rf-time').value=r.time||'';g('rf-dur').value=r.duration||'';g('rf-notes').value=r.notes||'';
  buildRoutinePicker();cm('routine-detail-modal');om('routine-modal');
}
function buildRoutinePicker(){
  const el=g('rpick');
  if(!items.length){el.innerHTML='<span style="font-size:12px;color:var(--text3)">Add products first.</span>';return;}
  const sorted=[...items].sort((a,b)=>{
    const ca=cats.find(c=>c.id===a.category)?.name||'';
    const cb=cats.find(c=>c.id===b.category)?.name||'';
    return ca.localeCompare(cb)||a.name.localeCompare(b.name);
  });
  const grouped={};
  sorted.forEach(item=>{
    const cat=cats.find(c=>c.id===item.category)||{name:'Other',icon:'✨'};
    if(!grouped[cat.name])grouped[cat.name]={icon:cat.icon||'✨',items:[]};
    grouped[cat.name].items.push(item);
  });
  el.innerHTML=Object.entries(grouped).map(([name,{icon,items:its}])=>
    `<div style="width:100%;margin:4px 0 2px"><span style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em">${icon} ${name}</span></div>`+
    its.map(item=>`<span class="chip ${selRoutineItems.includes(item.id)?'on':''}" onclick="togRI('${item.id}',this)">${item.name}</span>`).join('')
  ).join('');
}
function togRI(id,el){
  const idx=selRoutineItems.indexOf(id);
  if(idx>=0){selRoutineItems.splice(idx,1);el.classList.remove('on');}
  else{selRoutineItems.push(id);el.classList.add('on');}
}
function saveRoutine(){
  const name=gv('rf-name').trim();if(!name){showToast('Enter a name.');return;}
  const r={id:eRoutineId||mid(),name,time:gv('rf-time'),duration:gv('rf-dur'),items:[...selRoutineItems],notes:gv('rf-notes').trim(),createdAt:eRoutineId?(routines.find(x=>x.id===eRoutineId)||{}).createdAt||Date.now():Date.now(),updatedAt:Date.now()};
  if(eRoutineId)routines=routines.map(x=>x.id===eRoutineId?r:x);else routines.push(r);
  cm('routine-modal');rRoutines();showToast(eRoutineId?'Routine updated ✓':'Routine saved ✓');
  if(window.fbSave)window.fbSave('routines',r);
}
function delRoutine(){
  if(!eRoutineId||!confirm('Delete this routine?'))return;
  const id=eRoutineId;routines=routines.filter(r=>r.id!==id);
  cm('routine-modal');rRoutines();showToast('Deleted');
  if(window.fbDel)window.fbDel('routines',id);
}
function delRoutineById(id){
  if(!id||!confirm('Delete this routine?'))return;
  routines=routines.filter(r=>r.id!==id);
  cm('routine-detail-modal');rRoutines();showToast('Deleted');
  if(window.fbDel)window.fbDel('routines',id);
}
function openRoutineDetail(id){
  vRoutineId=id;
  const r=routines.find(x=>x.id===id);if(!r)return;
  const prods=(r.items||[]).map(id=>items.find(i=>i.id===id)).filter(Boolean);
  g('rd-name').textContent=r.name;
  g('rd-body').innerHTML=`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      ${r.time?`<span class="rtime-badge">⏱ ${r.time}</span>`:''}
      ${r.duration?`<span class="rtime-badge">🕐 ${r.duration}</span>`:''}
      <span class="rtime-badge">📦 ${prods.length} product${prods.length!==1?'s':''}</span>
    </div>
    ${prods.length?`<div style="margin-bottom:14px">${prods.map((p,i)=>{
      const h=hx(p.color);const fg=isLight(h)?'#1a1705':'#faf9f6';
      const cat=cats.find(c=>c.id===p.category)||{};
      const photos=(p.photoUrls||[]);const fp=photos[0]||null;
      return`<div class="routine-step">
        <div class="step-num">${i+1}</div>
        ${fp?`<div style="width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0"><img src="${fp}" style="width:100%;height:100%;object-fit:cover"></div>`:`<div style="width:36px;height:36px;border-radius:8px;background:${h};color:${fg};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${cat.icon||'💄'}</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${p.name}</div>
          <div style="font-size:11px;color:var(--text2)">${[p.brand,p.type].filter(Boolean).join(' · ')||'—'}</div>
        </div>
        <button class="btn sm gh" onclick="cm('routine-detail-modal');openDetail('${p.id}')">View</button>
      </div>`;}).join('')}</div>`:'<p style="font-size:13px;color:var(--text3);margin-bottom:14px">No products added yet.</p>'}
    ${r.notes?`<div style="background:var(--bg2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-line">${r.notes}</div>`:''} `;
  om('routine-detail-modal');
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
let cmpSel=[];
function rCompare(){
  sCH(`<div class="ch"><div class="cht">Compare</div><div class="chs">Compare up to 3 products side by side</div></div>`);
  if(!items.length){sFB('');sCt(`<div class="empty"><div class="ei">⚖️</div><p>Add products first to compare them.</p></div>`);return;}
  const srch=gv('cmpsrch').toLowerCase();
  const filtered=items.filter(i=>!srch||[i.name,i.brand||'',i.type||''].join(' ').toLowerCase().includes(srch));
  sFB(`<div class="fb"><div class="fbs"><input type="text" id="cmpsrch" placeholder="Search to add..." oninput="rCompare()"></div>${cmpSel.length?`<button class="btn sm dn" onclick="cmpSel=[];rCompare()">Clear</button>`:''}</div>`);
  let html='';
  if(cmpSel.length>=2){
    const prods=cmpSel.map(id=>items.find(i=>i.id===id)).filter(Boolean);
    const cols=prods.length;
    const fields=[['Type','type'],['Brand','brand'],['Shade','shade'],['Finish','finish'],['Formula','formula'],['Price','price'],['Stock','stock'],['Rating','rating'],['Skin type','skin'],['Store','store']];
    html+=`<div class="cmp-card" style="margin-bottom:14px">
      <div class="cmp-header" style="grid-template-columns:repeat(${cols},1fr)">
        ${prods.map(p=>{const h=hx(p.color);const fg=isLight(h)?'#1a1705':'#faf9f6';const cat=cats.find(c=>c.id===p.category)||{};const photos=(p.photoUrls||[]);const fp=photos[0]||null;
        return`<div class="cmp-col">
          ${fp?`<div style="width:56px;height:56px;border-radius:50%;overflow:hidden;margin:0 auto 8px;border:1px solid rgba(0,0,0,.08)"><img src="${fp}" style="width:100%;height:100%;object-fit:cover"></div>`:`<div class="cmp-swatch" style="background:${h};color:${fg}">${cat.icon||'💄'}</div>`}
          <div style="font-size:13px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
          <div style="font-size:11px;color:var(--text3)">${p.brand||'—'}</div>
          ${p.favourite?'<div style="font-size:11px;margin-top:4px">⭐ Favourite</div>':''}
          <button class="btn sm dn" style="margin-top:8px" onclick="cmpSel=cmpSel.filter(x=>x!=='${p.id}');rCompare()">Remove</button>
        </div>`;}).join('')}
      </div>
      ${fields.map(([label,key])=>{
        const vals=prods.map(p=>p[key]||'—');
        // highlight best price (lowest), best rating (5 stars first)
        let wins=[];
        if(key==='price'){const nums=vals.map(v=>parseFloat(v.replace(/[^0-9.]/g,'')||'Infinity'));const mn=Math.min(...nums);wins=nums.map(n=>n===mn&&mn<Infinity);}
        else if(key==='rating'){wins=vals.map(v=>v.startsWith('⭐⭐⭐⭐⭐'));}
        return`<div class="cmp-row" style="grid-template-columns:120px repeat(${cols},1fr)">
          <div class="cmp-cell">${label}</div>
          ${vals.map((v,i)=>`<div class="cmp-cell${wins[i]?' cmp-win':''}">${v}</div>`).join('')}
        </div>`;}).join('')}
    </div>`;
  }
  if(cmpSel.length<3){
    html+=`<div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">
      ${cmpSel.length===0?'Select 2–3 products to compare':cmpSel.length===1?'Select 1 or 2 more products':'Optionally add one more product'}
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">${filtered.filter(i=>!cmpSel.includes(i.id)).slice(0,20).map(i=>{
      const h=hx(i.color);const fg=isLight(h)?'#1a1705':'#faf9f6';const cat=cats.find(c=>c.id===i.category)||{};
      const photos=(i.photoUrls||[]);const fp=photos[0]||null;
      return`<div class="card" onclick="cmpSel.push('${i.id}');rCompare()" style="display:flex;align-items:center;gap:12px;padding:10px 13px">
        ${fp?`<div style="width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0"><img src="${fp}" style="width:100%;height:100%;object-fit:cover"></div>`:`<div style="width:36px;height:36px;border-radius:8px;background:${h};color:${fg};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid rgba(0,0,0,.07)">${cat.icon||'💄'}</div>`}
        <div style="flex:1;min-width:0"><div class="cn">${i.name}</div><div class="cs">${[i.brand,i.type].filter(Boolean).join(' · ')||'—'}</div></div>
        <span style="font-size:18px;color:var(--text3)">+</span>
      </div>`;}).join('')}</div>`;
  }
  sCt(html||'<div class="empty"><div class="ei">⚖️</div><p>Select products above to compare.</p></div>');
}

// ── CLOUDINARY PHOTO UPLOAD ──────────────────────────────────────────────────
const CL_CLOUD='dirakuvhp',CL_PRESET='wardrobe',CL_URL='https://api.cloudinary.com/v1_1/'+CL_CLOUD+'/image/upload';

async function uploadPhoto(file){
  const blob=await new Promise((res,rej)=>{
    const rd=new FileReader();rd.onerror=rej;
    rd.onload=e=>{
      const img=new Image();
      img.onerror=()=>res(file);
      img.onload=()=>{
        const MAX=1200;let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(b=>res(b||file),'image/jpeg',.82);
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
  const fd=new FormData();
  fd.append('file',blob);
  fd.append('upload_preset',CL_PRESET);
  fd.append('folder','makeup');
  try{
    const r=await fetch(CL_URL,{method:'POST',body:fd});
    const d=await r.json();
    if(d.secure_url)return d.secure_url;
    throw new Error(d.error?.message||'Upload failed');
  }catch(e){
    console.error('Upload error:',e);
    showToast('Photo upload failed');
    return null;
  }
}

async function uploadPhotos(files){
  if(!files.length)return[];
  showToast('Uploading photo'+(files.length>1?'s':'')+'...');
  const urls=[];
  for(const f of files){const u=await uploadPhoto(f);if(u)urls.push(u);}
  if(urls.length)showToast('Photo'+(urls.length>1?'s':'')+' uploaded!');
  return urls;
}
